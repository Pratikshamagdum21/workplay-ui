<p-toast position="top-center" key="global"></p-toast>
<app-loader></app-loader>

<div class="mobile-app-container">
  <header class="mobile-header">
    <div class="mobile-header-inner">
      <span class="mobile-logo-icon">
        <i class="pi pi-building"></i>
      </span>
      <span class="mobile-app-title">Shivai Textile</span>
      <div class="mobile-branch-selector">
        <p-select
          [options]="branches"
          [(ngModel)]="selectedBranch"
          optionLabel="name"
          dataKey="id"
          placeholder="Select Branch"
          (onChange)="onBranchChange($event)"
          styleClass="mobile-branch-dropdown">
          <ng-template pTemplate="selectedItem" let-branch>
            <div class="mobile-branch-selected" *ngIf="branch">
              <i class="pi pi-map-marker"></i>
              <span>{{ branch.name }}</span>
            </div>
          </ng-template>
          <ng-template pTemplate="item" let-branch>
            <div class="mobile-branch-option">
              <i class="pi pi-map-marker"></i>
              <span>{{ branch.name }}</span>
            </div>
          </ng-template>
        </p-select>
      </div>
    </div>
  </header>

  <main class="mobile-main-content">
    <router-outlet></router-outlet>
  </main>

  <nav class="mobile-bottom-tabs">
    <button class="mobile-tab-btn" [class.active]="activeTab === 'daily-work'" (click)="navigateTo('daily-work')">
      <i class="pi pi-calendar-clock"></i>
      <span>Daily Work</span>
    </button>
    <button class="mobile-tab-btn" [class.active]="activeTab === 'invoices'" (click)="navigateTo('invoices')">
      <i class="pi pi-file-edit"></i>
      <span>Invoices</span>
    </button>
  </nav>
</div>
