<div class="add-work-container">
    <p-toast></p-toast>
    <form [formGroup]="workForm" (ngSubmit)="onSubmit()">
        <div class="grid">
            <!-- Employee Name -->
            <div class="col-12 md:col-4">
                <div class="field">
                    <label for="employeeName" class="required-label">
                        <i class="pi pi-user"></i> Employee Name
                    </label>
                    <p-select id="employeeName" formControlName="employeeName" appendTo="body" [options]="employees" optionLabel="name" placeholder="Select Employee" [filter]="true" filterBy="name" [showClear]="true" styleClass="w-full" [class.ng-invalid]="isFieldInvalid('employeeName')"
                        [class.ng-dirty]="isFieldInvalid('employeeName')" (onChange)="onEmployeeChange($event)">
                    </p-select>
                    <small class="p-error" *ngIf="isFieldInvalid('employeeName')">
                        {{ getErrorMessage('employeeName') }}
                    </small>
                </div>
            </div>

            <!-- Work Type -->
            <div class="col-12 md:col-4">
                <div class="field">
                    <label for="workType" class="required-label">
                        <i class="pi pi-briefcase"></i> Work Type
                    </label>
                    <p-select id="workType" appendTo="body" formControlName="workType" [options]="workTypes" optionLabel="name" optionValue="name" placeholder="Select Work Type" styleClass="w-full" [class.ng-invalid]="isFieldInvalid('workType')" [class.ng-dirty]="isFieldInvalid('workType')">
                    </p-select>
                    <small class="p-error" *ngIf="isFieldInvalid('workType')">
                        {{ getErrorMessage('workType') }}
                    </small>
                </div>
            </div>

            <!-- Fabric Type -->
            <div class="col-12 md:col-4">
                <div class="field">
                    <label for="employeeType" class="required-label">
                        <i class="pi pi-briefcase"></i> Fabric Type
                    </label>
                    <p-select id="employeeType" appendTo="body" formControlName="employeeType" [options]="fabricTypes" optionLabel="name" optionValue="name" placeholder="Select Fabric Type" styleClass="w-full" [class.ng-invalid]="isFieldInvalid('employeeType')" [class.ng-dirty]="isFieldInvalid('employeeType')">
                    </p-select>
                    <small class="p-error" *ngIf="isFieldInvalid('employeeType')">
                        {{ getErrorMessage('employeeType') }}
                    </small>
                </div>
            </div>

            <!-- Fabric Meters -->
            <div class="col-12 md:col-4">
                <div class="field">
                    <label for="fabricMeters" class="required-label">
                        <i class="pi pi-chart-line"></i> Fabric (Meters)
                    </label>
                    <p-inputnumber id="fabricMeters" formControlName="fabricMeters" appendTo="body" [min]="1" [showButtons]="true" buttonLayout="horizontal" incrementButtonIcon="pi pi-plus" decrementButtonIcon="pi pi-minus" placeholder="Enter meters" styleClass="w-full" [class.ng-invalid]="isFieldInvalid('fabricMeters')"
                        [class.ng-dirty]="isFieldInvalid('fabricMeters')">
                    </p-inputnumber>
                    <small class="p-error" *ngIf="isFieldInvalid('fabricMeters')">
                        {{ getErrorMessage('fabricMeters') }}
                    </small>
                </div>
            </div>
<div class="col-12 md:col-2">
    <div class="field">
                                           <label for="date" class="required-label">
                        <i class="pi pi-minus-circle"></i> Weekly Date Mode:
                    </label>
                        <p-checkbox [(ngModel)]="isRangeMode" [ngModelOptions]="{standalone: true}" [binary]="true" label="Date Range (Weekly Entry)" (onChange)="onDateModeChange()">
                        </p-checkbox>
                    </div>
</div>
            <!-- Date -->
            <div class="col-12 md:col-5">
                <div class="field">
                    <label for="date" class="required-label">
                        <i class="pi pi-calendar"></i> Date
                    </label>

                    <!-- Single Date Picker -->
                    <p-datepicker *ngIf="!isRangeMode" id="date" formControlName="date" appendTo="body" [showIcon]="true" dateFormat="dd/mm/yy" [showButtonBar]="true" placeholder="Select Date" styleClass="w-full" [class.ng-invalid]="isFieldInvalid('date')" [class.ng-dirty]="isFieldInvalid('date')">
                    </p-datepicker>

                    <!-- Range Date Picker -->
                    <p-datepicker *ngIf="isRangeMode" id="date" formControlName="date" appendTo="body" selectionMode="range" [showIcon]="true" dateFormat="dd/mm/yy" [showButtonBar]="true" placeholder="Select Saturday to Friday range" styleClass="w-full" [class.ng-invalid]="isFieldInvalid('date')" [class.ng-dirty]="isFieldInvalid('date')">
                    </p-datepicker>
                    <small *ngIf="dateRangeError" class="p-error">{{ dateRangeError }}</small>
                    <small *ngIf="isRangeMode && !dateRangeError" class="text-color-secondary">Week must start on Saturday and end on Friday</small>

                    <small class="p-error" *ngIf="isFieldInvalid('date') && !dateRangeError">
                        {{ getErrorMessage('date') }}
                    </small>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="col-12">
                <div class="button-group">
                    <p-button [label]="isEditMode ? 'Update Entry' : 'Add Entry'" [icon]="isEditMode ? 'pi pi-check' : 'pi pi-plus'" type="submit" severity="success" [disabled]="workForm.invalid || dateRangeError">
                    </p-button>
                    <p-button label="Reset" icon="pi pi-refresh" type="button" severity="secondary" [outlined]="true" (onClick)="resetForm()">
                    </p-button>
                </div>
            </div>
        </div>
    </form>
</div>
